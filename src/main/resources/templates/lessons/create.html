<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      th:inline="text">
<div th:insert="~{header :: headerFragment}"></div>
<br>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Crea nuovo corso</title>
    <div class="row">
        <div class="col-md-4"></div>
        <div class="col-md-4">
            <th:block th:if="${!#strings.isEmpty(message)}">
                <div class="alert alert-success" role="alert">
                    <th:block th:text="${message}"></th:block>
                </div>
            </th:block>
            <th:block th:if="${!#strings.isEmpty(error)}">
                <div class="alert alert-danger" role="alert">
                    <th:block th:text="${error}"></th:block>
                </div>
            </th:block>
        </div>
        <div class="col-md-4"></div>
    </div>
</head>
<body>
<br>
<h1>Crea nuova lezione</h1>
<br>
<form method="post" action="/lessons">
    <input type="hidden" name="courseId" th:value="${courseId}">
    <div class="row">
        <div class="col-md-2">
            <label for="title" class="form-label">Titolo della lezione</label>
        </div>
        <div class="col-md-8 mb-3">
            <input type="text" id="title" name="title" class="form-control form-control-lg" placeholder="Digita il titolo...">
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary btn-lg btn-block">Crea lezione</button>
        </div>
    </div>
    <br>
    <br>
    <div class="row">
        <div class="col-md-4"></div>
        <div class="col-md-8">
            <div class="g-recaptcha col-sm-5" th:attr="data-sitekey=${@captchaSettings.getSite()}"></div>
        </div>
    </div>
</form>
</body>
</html>
<div th:insert="~{footer :: footerFragment}"></div>
