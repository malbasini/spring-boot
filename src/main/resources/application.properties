spring.application.name=Spring Boot Demo
spring.profiles.active=dev
server.port=8080
# Configurazione MySQL (esempio)
spring.datasource.url=jdbc:mysql://localhost:3306/MyCourseBoot
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.datasource.username=root
spring.datasource.password=TUA PASSWORD
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
#IMPLEMENTAZIONE GOOGLE RECAPTCHA V2
google.recaptcha.key.site=TUO SITE KEY
google.recaptcha.key.secret=TUO SECRET
#STRIPE O PAYPAL
payment.config.key.type=paypal
#PAYPAL
paypal.client.id=TUO ID
paypal.client.secret=TUO SECRET
paypal.mode=sandbox
#STRIPE
stripe.secret.key=SECRET
#MAIL TRAP
mail.trap.key.user=USER
mail.trap.key.password=PASSWORD
